project:
  raw_dir: "data/raw"
  external_path: "data/external_geofeatures_hydro_v2.csv"
  chirps_train_path: "data/external/chirps_features_training.csv"
  chirps_valid_path: "data/external/chirps_features_validation.csv"
  cache_dir: "cache"
  out_dir: "submissions_batch"
  exp_dir: "experiments"

io:
  template_name: "submission_template.csv"
  train_wq_name: "water_quality_training_dataset.csv"
  train_ls_name: "landsat_features_training.csv"
  train_tc_name: "terraclimate_features_training.csv"
  valid_ls_name: "landsat_features_validation.csv"
  valid_tc_name: "terraclimate_features_validation.csv"

switches:
  build_dataset: true
  run_cv: true
  train_final: true
  dev_mode: false

cv:
  folds: 5
  folds_dev: 3
  grouping_strategy: "basin"
  best_grid:
    Total Alkalinity: 0.03
    Electrical Conductance: 0.10
    Dissolved Reactive Phosphorus: 0.10

# REGLA DEL CHALLENGE: target encoding PROHIBIDO
te:
  enabled: false

features:
  station_aware:
    enabled: false
    include_obs_count: true

  drp_prune:
    enabled: false
    max_missing_pct: 0.40
    min_variance: 1e-6

  drp_focused:
    enabled: true
    include_interactions: true
    include_proxies: true

  # Switches para los nuevos feature patches
  add_hydro_interactions: true
  add_spatial_encoding: true
  precip_7_14_days: true
  precip_15_45_days: true
  nonlinear_hydrology: true
  rolling_windows: [30, 60, 90]

targets:
  list:
    - "Total Alkalinity"
    - "Electrical Conductance"
    - "Dissolved Reactive Phosphorus"
  y_mode: "winsor"
  y_mode_by_target:
    "Total Alkalinity": "winsor"
    "Electrical Conductance": "winsor"
    "Dissolved Reactive Phosphorus": "sqrt"

# ============================================================
# MODELOS: ensemble real por target
# Velocidad: ET 400 CV / 800 final (suficiente)
# ============================================================
model:
  et_cv:
    n_estimators: 400
    min_samples_leaf: 3
    max_features: "sqrt"
    n_jobs: -1
    random_state: 42

  et_final:
    n_estimators: 800
    min_samples_leaf: 3
    max_features: "sqrt"
    n_jobs: -1
    random_state: 42

  # ----------------------------------------------------------
  # TOTAL ALKALINITY — mejor con geología/clima
  # CatBoost captura no-linealidades distintas a ET
  # ----------------------------------------------------------
  cv_by_target:
    "Total Alkalinity":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 400
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 400
            learning_rate: 0.05
            depth: 6
            l2_leaf_reg: 3.0
            random_seed: 42
            verbose: 0
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 300
            learning_rate: 0.05
            max_depth: 6
            l2_regularization: 0.1
            random_state: 42

    # ----------------------------------------------------------
    # ELECTRICAL CONDUCTANCE — similar a TA
    # ----------------------------------------------------------
    "Electrical Conductance":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 400
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 400
            learning_rate: 0.05
            depth: 6
            l2_leaf_reg: 3.0
            random_seed: 42
            verbose: 0
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 300
            learning_rate: 0.05
            max_depth: 6
            l2_regularization: 0.1
            random_state: 42

    # ----------------------------------------------------------
    # DRP — fósforo es episódico, más ruido
    # HGB con loss huber es más robusto a outliers
    # ----------------------------------------------------------
    "Dissolved Reactive Phosphorus":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 400
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 300
            learning_rate: 0.05
            max_depth: 5
            l2_regularization: 0.5
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 300
            learning_rate: 0.05
            depth: 5
            l2_leaf_reg: 5.0
            random_seed: 42
            verbose: 0

  # ----------------------------------------------------------
  # FINAL — misma estructura, más estimadores
  # ----------------------------------------------------------
  final_by_target:
    "Total Alkalinity":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 800
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 800
            learning_rate: 0.03
            depth: 6
            l2_leaf_reg: 3.0
            random_seed: 42
            verbose: 0
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 500
            learning_rate: 0.03
            max_depth: 6
            l2_regularization: 0.1
            random_state: 42

    "Electrical Conductance":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 800
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 800
            learning_rate: 0.03
            depth: 6
            l2_leaf_reg: 3.0
            random_seed: 42
            verbose: 0
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 500
            learning_rate: 0.03
            max_depth: 6
            l2_regularization: 0.1
            random_state: 42

    "Dissolved Reactive Phosphorus":
      name: "EnsembleRegressor"
      estimators:
        - name: "ExtraTreesRegressor"
          params:
            n_estimators: 800
            min_samples_leaf: 3
            max_features: "sqrt"
            n_jobs: -1
            random_state: 42
        - name: "HistGradientBoostingRegressor"
          params:
            max_iter: 500
            learning_rate: 0.03
            max_depth: 5
            l2_regularization: 0.5
            random_state: 42
        - name: "CatBoostRegressor"
          params:
            iterations: 600
            learning_rate: 0.03
            depth: 5
            l2_leaf_reg: 5.0
            random_seed: 42
            verbose: 0

batch:
  candidates:
    - "submission_V4_4_DRP_tuned_ET_fixorder.csv"
    - "submission_V4_3_ETonly_allTargets__winsor_allTargets_fixorder.csv"
    - "submission_A_ensemble_nolog.csv"
    - "submission_B_ensemble_log_EC_DRP.csv"

  make_rankblend_drp: true
  make_balanced_blend: true

project:
  raw_dir: "C:/Projects/ey-water-quality-2026/data/raw"
  external_path: "C:/Projects/ey-water-quality-2026/data/external_geofeatures.csv"
  cache_dir: "cache"
  out_dir: "submissions_batch"

io:
  template_name: "submission_template.csv"
  train_wq_name: "water_quality_training_dataset.csv"
  train_ls_name: "landsat_features_training.csv"
  train_tc_name: "terraclimate_features_training.csv"
  valid_ls_name: "landsat_features_validation.csv"
  valid_tc_name: "terraclimate_features_validation.csv"

switches:
  build_dataset: true
  run_cv: true
  train_final: true
  dev_mode: false   # true = CV rápido

cv:
  folds: 5
  folds_dev: 3
  best_grid:
    Total Alkalinity: 0.03
    Electrical Conductance: 0.10
    Dissolved Reactive Phosphorus: 0.10

te:
  enabled: true
  grids: [0.05, 0.2]
  # IMPORTANT: OOF TE para TRAIN (evita leakage)
  oof_grid_for_groups: 0.20

targets:
  list:
    - "Total Alkalinity"
    - "Electrical Conductance"
    - "Dissolved Reactive Phosphorus"
  y_mode: "winsor"   # winsor | none
  # ✅ override por target (si no existe usa y_mode)
  y_mode_by_target:
    "Total Alkalinity": "winsor"
    "Electrical Conductance": "winsor"
    "Dissolved Reactive Phosphorus": "none"

model:
  et_cv:
    n_estimators: 1400
    min_samples_leaf: 2
    max_features: "sqrt"
    n_jobs: -1
    random_state: 42
  et_final:
    n_estimators: 3000
    min_samples_leaf: 2
    max_features: "sqrt"
    n_jobs: -1
    random_state: 42

batch:
  # lista de submissions que quieres considerar en blends (si existen)
  candidates:
    - "submission_V4_4_DRP_tuned_ET_fixorder.csv"
    - "submission_V4_3_ETonly_allTargets__winsor_allTargets_fixorder.csv"
    - "submission_A_ensemble_nolog.csv"
    - "submission_B_ensemble_log_EC_DRP.csv"
  # genera estos blends si están disponibles
  make_rankblend_drp: true
  make_balanced_blend: true